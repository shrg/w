<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Погода</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Верхняя панель: слева — погода дома, справа — мировые часы -->
    <div id="top-panel">
      <div id="home-weather"></div>
      <div id="world-clock">
        <div id="cw-body"><div class="cw-loading">Загрузка…</div></div>
      </div>
    </div>

    <!-- Расширенный прогноз (9 дней + блок съёмки) для домашнего города -->
    <div id="home-forecast"></div>

    <!-- Карточки остальных городов -->
    <main id="cities-grid"></main>

  </div>
  <script src="app.js"></script>
</body>
</html>
